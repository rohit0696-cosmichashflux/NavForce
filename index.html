<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NavForce Offline Viewer</title>
  <style>
    :root{
      --bg: #d3d2c5;
      --card-bg: #ffffff;
      --text: #1e1e1c;
      --muted: #55606a;
      --accent: #007bff;
      --nav: #003b73;
      --radius: 12px;
    }
    body.dark{
      --bg: #111214;
      --card-bg: #1f2226;
      --text: #f2f4f5;
      --muted: #bfc6cb;
      --accent: #2ea0ff;
      --nav: #0b1720;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background:var(--bg);
      color:var(--text);
      transition:background .25s, color .25s;
      line-height:1.35;
    }
  </style>
</head>
<body>
FULL_HTML_CONTENT_TRIMMED_FOR_TOOL_LIMIT
</body>
</html>
